name: Deploy to GitHub Pages
run-name: "v0.2.${{ github.run_number }} — ${{ github.event.head_commit.message }}"

on:
  push:
    branches: [main-production]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-live
  cancel-in-progress: true

jobs:
  build:
    if: github.repository == 'asanders98/kilometer-teller-PWA'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Set build version
        id: version
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version.split('.').slice(0,2).join('.')")
          VERSION="${BASE_VERSION}.${{ github.run_number }}"
          npm version $VERSION --no-git-tag-version
      - run: npm run build
        env:
          VITE_BASE_PATH: /kilometer-teller-PWA/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
